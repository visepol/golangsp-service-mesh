# Three single-replica Deployments of the same image, distinguished only by the
# `version` label. One pod per version => one stable UUID per Istio subset, so
# the 60/20/20 split is clean and visible on screen.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api-v1
  labels: { app: go-api, version: v1 }
spec:
  replicas: 1
  selector:
    matchLabels: { app: go-api, version: v1 }
  template:
    metadata:
      labels: { app: go-api, version: v1 }
    spec:
      containers:
        - name: go-api
          image: go-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http2, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /api/v1/health, port: 8080 }
            periodSeconds: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api-v2
  labels: { app: go-api, version: v2 }
spec:
  replicas: 1
  selector:
    matchLabels: { app: go-api, version: v2 }
  template:
    metadata:
      labels: { app: go-api, version: v2 }
    spec:
      containers:
        - name: go-api
          image: go-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http2, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /api/v1/health, port: 8080 }
            periodSeconds: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api-v3
  labels: { app: go-api, version: v3 }
spec:
  replicas: 1
  selector:
    matchLabels: { app: go-api, version: v3 }
  template:
    metadata:
      labels: { app: go-api, version: v3 }
    spec:
      containers:
        - name: go-api
          image: go-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http2, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /api/v1/health, port: 8080 }
            periodSeconds: 2
---
# ClusterIP Service fronting all three versions. The port is named `http2` so
# Istio knows to do L7 (per-request) load balancing. WITHOUT this name the Envoy
# sidecar falls back to L4 and the mesh demo would show a single UUID.
apiVersion: v1
kind: Service
metadata:
  name: go-api
  labels: { app: go-api }
spec:
  type: ClusterIP
  selector: { app: go-api }
  ports:
    - name: http2
      appProtocol: http2
      port: 8080
      targetPort: 8080
