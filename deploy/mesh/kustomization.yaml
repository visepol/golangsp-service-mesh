apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Same workloads as base, plus Istio traffic management. The namespace carries
# `istio-injection=enabled` (applied by `make dev`), so every pod gets an Envoy
# sidecar (2/2). Envoy reads the HTTP/2 frames (L7) and balances per request.
# This is Arco 7.
namespace: mesh
resources:
  - ../base
  - istio.yaml
